user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Preset name -> imgproxy processing path segment
    map $preset $imgproxy_processing {
        default     "";
        # Product family
        thumb       "rs:fill:200:200/g:ce";
        card        "rs:fit:400:0";
        card-2x     "rs:fit:800:0";
        gallery     "rs:fit:800:0";
        gallery-2x  "rs:fit:1600:0";
        hero        "rs:fit:1200:0";
        # Avatar / profile family
        avatar      "rs:fill:128:128/g:ce";
        avatar-2x   "rs:fill:256:256/g:ce";
        # Review / complaint / feedback evidence
        evidence    "rs:fit:1200:0";
        # Advertisement banners
        banner      "rs:fit:1920:0";
        banner-2x   "rs:fit:3840:0";
        # Chat thumbnails
        chat-thumb  "rs:fill:96:96/g:ce";
    }

    map $preset $preset_allowed {
        default 0;
        thumb 1;
        card 1;
        card-2x 1;
        gallery 1;
        gallery-2x 1;
        hero 1;
        avatar 1;
        avatar-2x 1;
        evidence 1;
        banner 1;
        banner-2x 1;
        chat-thumb 1;
    }

    upstream imgproxy_upstream {
        server imgproxy:8080;
        keepalive 16;
    }

    include /etc/nginx/conf.d/*.conf;
}
