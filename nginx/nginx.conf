worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Preset → imgproxy resize directive (must match app CDN presets)
    map $preset $imgproxy_resize {
        default     "";

        thumb       "rs:fit:200:200";
        card        "rs:fit:400:400";
        card-2x     "rs:fit:800:800";
        gallery     "rs:fit:1024:1024";
        gallery-2x  "rs:fit:2048:2048";
        hero        "rs:fit:1920:1920";

        avatar      "rs:fill:128:128";
        avatar-2x   "rs:fill:256:256";

        evidence    "rs:fit:1024:1024";

        banner      "rs:fill:1200:400";
        banner-2x   "rs:fill:2400:800";

        chat-thumb  "rs:fit:200:200";
    }

    upstream imgproxy_upstream {
        server imgproxy:8080;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Health check — used by deploy scripts and load balancers
        location = /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        # CDN image delivery: /i/{asset_uuid}/{preset}
        location ~ ^/i/(?<asset_id>[0-9a-fA-F-]{36})/(?<preset>[a-z0-9-]+)$ {
            if ($imgproxy_resize = "") {
                return 404;
            }

            set $imgproxy_path /insecure/$imgproxy_resize/plain/s3://shopnan-media/originals/$asset_id@webp;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_pass http://imgproxy_upstream$imgproxy_path;

            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options nosniff;
        }
    }
}
