server {
    listen 80;
    server_name cdn.shopnan.com;

    resolver 127.0.0.11 valid=10s ipv6=off;

    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Public CDN URL: /i/{asset_uuid}/{preset}
    # Object key in MinIO: originals/{asset_uuid}  (no extension; format detected by imgproxy)
    location ~ "^/i/([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})/([a-z0-9-]+)$" {
        set $asset_id $1;
        set $preset $2;

        if ($preset_allowed = 0) {
            return 403;
        }

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        proxy_pass_header Cache-Control;
        proxy_pass_header ETag;
        proxy_pass_header Content-Type;
        proxy_hide_header X-Powered-By;

        proxy_pass http://imgproxy_upstream/unsafe/$imgproxy_processing/plain/s3://shopnan-media/originals/$asset_id@webp;
    }

    location / {
        return 404;
    }
}
