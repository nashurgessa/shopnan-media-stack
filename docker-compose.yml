services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # Dev only: Flask on host uploads via http://127.0.0.1:9000 (remove or firewall in production)
      - "9000:9000"
    networks:
      - media_backend
      # Dev: host Flask uploads need a non-internal network for published port 9000
      - media_edge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      FLASK_S3_ACCESS_KEY: ${FLASK_S3_ACCESS_KEY}
      FLASK_S3_SECRET_KEY: ${FLASK_S3_SECRET_KEY}
      IMGPROXY_S3_ACCESS_KEY: ${IMGPROXY_S3_ACCESS_KEY}
      IMGPROXY_S3_SECRET_KEY: ${IMGPROXY_S3_SECRET_KEY}
    volumes:
      - ./scripts/init-minio.sh:/init-minio.sh:ro
      - ./scripts/policies:/policies:ro
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    networks:
      - media_backend
    restart: "no"

  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${IMGPROXY_S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${IMGPROXY_S3_SECRET_KEY}
      AWS_REGION: us-east-1
      IMGPROXY_ALLOWED_SOURCES: s3://shopnan-media/originals/
      IMGPROXY_MAX_SRC_RESOLUTION: ${IMGPROXY_MAX_SRC_RESOLUTION:-50}
      IMGPROXY_MAX_SRC_FILE_SIZE: ${IMGPROXY_MAX_SRC_FILE_SIZE:-10485760}
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
      IMGPROXY_ENABLE_AVIF_DETECTION: "true"
      IMGPROXY_STRIP_METADATA: "true"
      IMGPROXY_STRIP_COLOR_PROFILE: "true"
      IMGPROXY_QUALITY: ${IMGPROXY_QUALITY:-80}
      IMGPROXY_AVIF_SPEED: "6"
      IMGPROXY_CACHE_CONTROL: "public, max-age=31536000, immutable"
      IMGPROXY_CONCURRENCY: ${IMGPROXY_CONCURRENCY:-4}
      IMGPROXY_DOWNLOAD_TIMEOUT: "10"
      IMGPROXY_READ_REQUEST_TIMEOUT: "10"
      IMGPROXY_WRITE_RESPONSE_TIMEOUT: "10"
      IMGPROXY_LOG_LEVEL: "info"
    networks:
      - media_backend
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      imgproxy:
        condition: service_healthy
    ports:
      - "${CDN_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - media_backend
      - media_edge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

networks:
  # MinIO and imgproxy are not reachable from the host or public internet.
  media_backend:
    driver: bridge
    internal: true
  # NGINX joins this network for published ports (8088 -> host, later Cloudflare origin).
  media_edge:
    driver: bridge

volumes:
  minio_data:
