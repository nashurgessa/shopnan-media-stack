services:
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # Expose only for local dev; firewall this port in production.
      - "9000:9000"
      - "9001:9001"
    networks:
      - media-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2024-12-18T13-15-44Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      FLASK_S3_ACCESS_KEY: ${FLASK_S3_ACCESS_KEY}
      FLASK_S3_SECRET_KEY: ${FLASK_S3_SECRET_KEY}
      IMGPROXY_S3_ACCESS_KEY: ${IMGPROXY_S3_ACCESS_KEY}
      IMGPROXY_S3_SECRET_KEY: ${IMGPROXY_S3_SECRET_KEY}
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]
    volumes:
      - ./scripts/init-minio.sh:/scripts/init-minio.sh:ro
      - ./scripts/policies:/scripts/policies:ro
    networks:
      - media-net
    restart: "no"

  imgproxy:
    image: darthsim/imgproxy:v3.24.1
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      IMGPROXY_S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${IMGPROXY_S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${IMGPROXY_S3_SECRET_KEY}
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_ENFORCE_WEBP: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
      IMGPROXY_MAX_SRC_RESOLUTION: 50
      IMGPROXY_LOG_LEVEL: warn
    networks:
      - media-net
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cdn:
    image: nginx:1.27-alpine
    depends_on:
      imgproxy:
        condition: service_healthy
    ports:
      - "${CDN_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - media-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  media-net:
    driver: bridge

volumes:
  minio_data:
